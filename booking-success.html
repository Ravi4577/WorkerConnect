<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Complete - Worker Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            /* soften the background colors for a lighter feel */
            background: linear-gradient(135deg, #a8c0ff, #d4fc79);
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            color: #333;
        }

        .card h1 {
            color: #2e7d32;
            /* green tone */
        }

        .btn-primary {
            background-color: #6a11cb;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            display: inline-block;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #2e005e;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎉 Congratulations!</h1>
        <p>Your booking has been successfully completed.</p>
        <a href="workers.html" class="btn-primary">View Workers</a>
    </div>
</body>

</html>
